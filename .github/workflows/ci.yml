name: CI

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      # 术语铁律：那个特权角色对用户一律称「网络管理员」。叫它 root 会和系统 root 混淆，
      # 而它跟系统权限毫无关系。
      - name: user-facing strings never say root
        run: |
          if grep -rniE 'root' android/app/src/main/res/values/; then
            echo "user-facing strings must say 网络管理员, not root" >&2
            exit 1
          fi

      - name: Install protoc
        run: |
          PROTOC_VERSION=25.5
          curl -LsSf -o /tmp/protoc.zip \
            https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_VERSION}/protoc-${PROTOC_VERSION}-linux-x86_64.zip
          unzip -q /tmp/protoc.zip -d /tmp/protoc25
          sudo install -m 0755 /tmp/protoc25/bin/protoc /usr/local/bin/protoc
          sudo cp -r /tmp/protoc25/include/google /usr/local/include/
          protoc --version

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libclang-dev clang pkg-config

      - name: Setup Rust toolchain (rust-toolchain.toml pins 1.95)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo check --workspace
        run: cargo check --workspace --all-targets

      - name: cargo clippy --workspace -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace --all-targets

      - name: cargo doc --no-deps
        run: cargo doc --no-deps --workspace

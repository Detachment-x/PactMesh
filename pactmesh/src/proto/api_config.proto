syntax = "proto3";

import "common.proto";
import "acl.proto";
import "api_instance.proto";
import "api_manage.proto";

package api.config;

enum ConfigPatchAction {
  ADD = 0;
  REMOVE = 1;
  CLEAR = 2;
}

message InstanceConfigPatch {
  optional string hostname = 1;
  optional common.Ipv4Inet ipv4 = 2;
  optional common.Ipv6Inet ipv6 = 3;
  repeated PortForwardPatch port_forwards = 4;
  optional AclPatch acl = 5;
  repeated ProxyNetworkPatch proxy_networks = 6;
  repeated RoutePatch routes = 7;
  repeated ExitNodePatch exit_nodes = 8;
  repeated UrlPatch mapped_listeners = 9;
  repeated UrlPatch connectors = 10;
  repeated RelayServingPatch relay_serving = 11;
  // MagicDNS 运行时热切：开关 + 顶级区。两者任一有值即触发 NIC ctx 重建。
  optional bool accept_dns = 12;
  optional string tld_dns_zone = 13;
}

message PortForwardPatch {
  ConfigPatchAction action = 1;
  common.PortForwardConfigPb cfg = 2;
}

message StringPatch {
  ConfigPatchAction action = 1;
  string value = 2;
}

message UrlPatch {
  ConfigPatchAction action = 1;
  common.Url url = 2;
}

message AclPatch {
  optional acl.Acl acl = 1;
  repeated StringPatch tcp_whitelist = 2;
  repeated StringPatch udp_whitelist = 3;
}

message ProxyNetworkPatch {
  ConfigPatchAction action = 1;
  common.Ipv4Inet cidr = 2;
  optional common.Ipv4Inet mapped_cidr = 3;
}

message RoutePatch {
  ConfigPatchAction action = 1;
  common.Ipv4Inet cidr = 2;
}

message ExitNodePatch {
  ConfigPatchAction action = 1;
  common.IpAddr node = 2;
}

// 跨信任域中继授权（trust_domain.relay_serving）的运行时补丁。Add 按
// foreign_root_pk_hex 做 upsert，Remove 按 hex 删除，Clear 清空。
message RelayServingPatch {
  ConfigPatchAction action = 1;
  string foreign_root_pk_hex = 2;
  bool can_relay_data = 3;
  bool can_assist_holepunch = 4;
  uint64 expires_at = 5;
}

message PatchConfigRequest {
  InstanceConfigPatch patch = 1;
  api.instance.InstanceIdentifier instance = 2;
  optional bytes network_state_cbor = 3;
}

message PatchConfigResponse {}

message GetConfigRequest {
  api.instance.InstanceIdentifier instance = 1;
}

message GetConfigResponse {
  api.manage.NetworkConfig config = 1;
}

service ConfigRpc {
  rpc PatchConfig(PatchConfigRequest) returns (PatchConfigResponse);
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
}

message SubmitJoinRequestRequest {
  api.instance.InstanceIdentifier instance = 1;
  bytes join_request_cbor = 2;
  uint32 ttl = 3;
}

message SubmitJoinRequestResponse { uint32 hop_count = 1; }

message FetchPendingMemberCertRequest {
  api.instance.InstanceIdentifier instance = 1;
  bytes trust_domain_id = 2;
  string network_local_id = 3;
  bytes applicant_pk = 4;
}

message FetchPendingMemberCertResponse {
  bool found = 1;
  bytes member_cert_cbor = 2;
  bytes network_state_cbor = 3;
}

message PendingJoinRequestSummary {
  bytes trust_domain_id = 1;
  string network_local_id = 2;
  bytes applicant_pk = 3;
  string device_label = 4;
  string hint = 5;
}

message ApproveJoinRequestRequest {
  api.instance.InstanceIdentifier instance = 1;
  bytes trust_domain_id = 2;
  string network_local_id = 3;
  bytes applicant_pk = 4;
  optional bytes member_cert_cbor = 5;
  optional bytes network_state_cbor = 6;
}

message ApproveJoinRequestResponse {
  bytes member_cert_cbor = 1;
}

message RejectJoinRequestRequest {
  api.instance.InstanceIdentifier instance = 1;
  bytes trust_domain_id = 2;
  string network_local_id = 3;
  bytes applicant_pk = 4;
}

message RejectJoinRequestResponse {}

message UpgradePeerToRootRequest {
  api.instance.InstanceIdentifier instance = 1;
  bytes trust_domain_id = 2;
  string network_local_id = 3;
  uint32 peer_id = 4;
  bytes sk_root_payload = 5;
}

message UpgradePeerToRootResponse { bool ack = 1; }

message ListPendingJoinRequestsRequest {
  api.instance.InstanceIdentifier instance = 1;
  bytes trust_domain_id = 2;
  string network_local_id = 3;
}

message ListPendingJoinRequestsResponse {
  repeated PendingJoinRequestSummary requests = 1;
}

// 目标设备一次性预授权 root 升级：本机 TUI 收口令后武装一个限时、一次性的
// 接受令牌，随后远端 root 推送 sk_root_payload 时消费该令牌的口令落盘
// sk_root.age，无需 env。
message ArmRootUpgradeAcceptanceRequest {
  api.instance.InstanceIdentifier instance = 1;
  string passphrase = 2;
  uint32 ttl_secs = 3;
}

message ArmRootUpgradeAcceptanceResponse { uint32 ttl_secs = 1; }

service TrustJoinManageRpc {
  rpc SubmitJoinRequest(SubmitJoinRequestRequest) returns (SubmitJoinRequestResponse);
  rpc FetchPendingMemberCert(FetchPendingMemberCertRequest) returns (FetchPendingMemberCertResponse);
  rpc ApproveJoinRequest(ApproveJoinRequestRequest) returns (ApproveJoinRequestResponse);
  rpc RejectJoinRequest(RejectJoinRequestRequest) returns (RejectJoinRequestResponse);
  rpc UpgradePeerToRoot(UpgradePeerToRootRequest) returns (UpgradePeerToRootResponse);
  rpc ListPendingJoinRequests(ListPendingJoinRequestsRequest) returns (ListPendingJoinRequestsResponse);
  rpc ArmRootUpgradeAcceptance(ArmRootUpgradeAcceptanceRequest) returns (ArmRootUpgradeAcceptanceResponse);
}
